<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Solos Elite Wallet</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.5/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tonweb/0.0.66/tonweb.bundle.js"></script>

    <style>
        :root {
            --bg: #000;
            --card: #121212;
            --accent: #007aff;
            --text: #ffffff;
            --dim: #888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* Кнопка коннекта - делаем её заметной */
        #ton-connect-button {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            min-height: 40px;
        }

        .header {
            padding: 20px;
            text-align: center;
        }

        .balance-card {
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            margin: 0 20px;
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid #222;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .main-balance { font-size: 48px; font-weight: 800; margin: 10px 0; }
        .main-balance span { font-size: 20px; color: var(--accent); }

        .actions-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 30px 20px;
        }

        .btn-act {
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            opacity: 0.5; pointer-events: none; /* Выключено пока нет коннекта */
            transition: 0.3s;
        }

        .btn-act.active { opacity: 1; pointer-events: auto; }

        .circle {
            width: 60px; height: 60px;
            background: var(--card);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: 1px solid #333;
        }

        .label { font-size: 12px; color: var(--dim); font-weight: 600; }

        .section-title { padding: 0 25px; font-size: 20px; font-weight: 700; margin-top: 10px; }

        .asset-list { padding: 20px; }
        .asset {
            background: var(--card);
            padding: 20px; border-radius: 20px;
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px;
            border: 1px solid #1a1a1a;
        }

        /* Модалка */
        .modal {
            position: fixed; bottom: -100%; left: 0; right: 0;
            background: #111; padding: 40px 20px;
            border-radius: 30px 30px 0 0;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9999;
            border-top: 1px solid #333;
        }
        .modal.open { bottom: 0; }

        input {
            width: 100%; background: #222; border: 1px solid #333;
            padding: 18px; border-radius: 15px; color: white;
            font-size: 16px; margin-bottom: 20px; outline: none;
        }

        .send-btn {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 18px; border-radius: 15px;
            font-size: 18px; font-weight: 700;
        }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: none; z-index: 9998;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="greet">SOLOS WALLET</h2>
        <div id="ton-connect-button"></div>
    </div>

    <div class="balance-card">
        <div style="color: var(--dim); font-size: 14px; text-transform: uppercase;">Доступный баланс</div>
        <div class="main-balance" id="b-val">0.00 <span>TON</span></div>
        <div id="addr-display" style="font-size: 10px; color: #444; word-break: break-all; padding: 0 40px;">WALLET DISCONNECTED</div>
    </div>

    <div class="actions-bar">
        <div class="btn-act" id="act-send" onclick="showSend()">
            <div class="circle">🚀</div><div class="label">Send</div>
        </div>
        <div class="btn-act" id="act-recv" onclick="showRecv()">
            <div class="circle">📥</div><div class="label">Receive</div>
        </div>
        <div class="btn-act" id="act-swap">
            <div class="circle">🔄</div><div class="label">Swap</div>
        </div>
        <div class="btn-act" id="act-scan" onclick="scan()">
            <div class="circle">📷</div><div class="label">Scan</div>
        </div>
    </div>

    <div class="section-title">Активы</div>
    <div class="asset-list">
        <div class="asset">
            <div style="display:flex; align-items:center; gap:15px;">
                <div style="width:45px; height:45px; background:#007aff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">T</div>
                <div><div style="font-weight:700;">Toncoin</div><div style="font-size:12px; color:var(--dim);">TON</div></div>
            </div>
            <div style="text-align:right;"><div id="ton-asset" style="font-weight:700;">0.00</div><div style="font-size:12px; color:#34c759;">Real-time</div></div>
        </div>
    </div>

    <div class="overlay" id="ovl" onclick="closeAll()"></div>
    <div class="modal" id="send-modal">
        <h3 style="margin-top:0">Отправить TON</h3>
        <input type="text" id="dest" placeholder="Адрес (EQ...)">
        <input type="number" id="summ" placeholder="Сумма TON">
        <button class="send-btn" onclick="processSend()">ПОДТВЕРДИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 1. Инициализируем TON Connect UI
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/uniloc/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        const tw = new TonWeb();
        let userWallet = null;

        // 2. Логика обновления
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                userWallet = wallet.account.address;
                document.getElementById('addr-display').innerText = userWallet;
                document.querySelectorAll('.btn-act').forEach(b => b.classList.add('active'));
                updateBalance();
            } else {
                userWallet = null;
                document.getElementById('addr-display').innerText = "WALLET DISCONNECTED";
                document.querySelectorAll('.btn-act').forEach(b => b.classList.remove('active'));
            }
        });

        async function updateBalance() {
            if (!userWallet) return;
            try {
                const b = await tw.getBalance(userWallet);
                const res = (b / 1e9).toFixed(2);
                document.getElementById('b-val').innerHTML = `${res} <span>TON</span>`;
                document.getElementById('ton-asset').innerText = res;
            } catch (e) { console.error(e); }
        }

        // 3. Функции кнопок
        function showSend() {
            document.getElementById('ovl').style.display = 'block';
            document.getElementById('send-modal').classList.add('open');
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function closeAll() {
            document.getElementById('ovl').style.display = 'none';
            document.getElementById('send-modal').classList.remove('open');
        }

        async function processSend() {
            const a = document.getElementById('dest').value;
            const s = document.getElementById('summ').value;
            if(!a || !s) return tg.showAlert("Введи данные!");

            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [{ address: a, amount: (s * 1e9).toString() }]
            };

            try {
                await tonConnectUI.sendTransaction(tx);
                tg.showAlert("Успешно отправлено!");
                closeAll();
            } catch (e) { tg.showAlert("Отмена или ошибка"); }
        }

        function scan() {
            tg.showScanQrPopup({ text: "Сканируй адрес" }, (res) => {
                document.getElementById('dest').value = res;
                showSend();
                return true;
            });
        }

        // Имя юзера
        if(tg.initDataUnsafe.user) {
            document.getElementById('greet').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
        }
    </script>
</body>
</html>
