<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #000; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .balance-card { background: linear-gradient(135deg, #1e1e1e 0%, #111 100%); width: 100%; border-radius: 20px; padding: 25px; box-sizing: border-box; border: 1px solid #333; margin-bottom: 20px; }
        .label { color: #888; font-size: 14px; margin-bottom: 5px; }
        .amount { font-size: 36px; font-weight: bold; color: #007AFF; }
        .btn { background-color: #007AFF; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .btn-secondary { background-color: #222; }
    </style>
</head>
<body>
    <div class="balance-card">
        <div class="label">Твой баланс</div>
        <div class="amount">0.00 TON</div>
    </div>
    
    <button class="btn" onclick="sendMoney()">Отправить</button>
    <button class="btn btn-secondary" onclick="receiveMoney()">Получить</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendMoney() {
            tg.showAlert("Функция отправки в разработке!");
        }

        function receiveMoney() {
            tg.showPopup({
                title: 'Мой адрес',
                message: 'EQB...твои_цифры',
                buttons: [{type: 'ok'}]
            });
        }
    </script>
</body>
</html>
