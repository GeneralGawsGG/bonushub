<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecosystem Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --gold: #f3ba2f;
            --text: #ffffff;
            --hint: #8e8e93;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .balance-card {
            text-align: center; margin: 40px 0;
        }
        .balance-value {
            font-size: 54px; font-weight: 800; color: var(--gold);
        }
        .task-list { width: 100%; }
        .task-card {
            background: var(--card); border-radius: 15px;
            padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn {
            background: var(--gold); border: none; padding: 8px 20px;
            border-radius: 20px; font-weight: bold; cursor: pointer;
        }
        .nav {
            position: fixed; bottom: 20px; background: rgba(28,28,30,0.9);
            padding: 10px 30px; border-radius: 30px; display: flex; gap: 40px;
        }
    </style>
</head>
<body>
    <div id="user-name" style="font-weight: bold;">Привет!</div>
    
    <div class="balance-card">
        <div style="color: var(--hint)">БАЛАНС ХАБА</div>
        <div id="balance" class="balance-value">0</div>
        <div style="font-size: 12px; color: var(--gold)">★ PREMIUM POINTS</div>
    </div>

    <div class="task-list">
        <div class="task-card">
            <div>
                <div>AI Ролевая</div>
                <div style="color: var(--hint); font-size: 12px;">+100 XP</div>
            </div>
            <button class="btn" onclick="addXP(100)">GO</button>
        </div>
        <div class="task-card">
            <div>
                <div>Модерация чатов</div>
                <div style="color: var(--hint); font-size: 12px;">+250 XP</div>
            </div>
            <button class="btn" onclick="addXP(250)">GO</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        let score = parseInt(localStorage.getItem('score')) || 0;
        document.getElementById('balance').innerText = score;

        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = "Привет, " + tg.initDataUnsafe.user.first_name + "!";
        }

        function addXP(amount) {
            score += amount;
            document.getElementById('balance').innerText = score;
            localStorage.setItem('score', score);
            tg.HapticFeedback.notificationOccurred('success'); // Вибрация
        }
    </script>
</body>
</html>
