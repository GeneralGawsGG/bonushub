<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #ton-connect-button { margin-bottom: 20px; }
        .user-info { background: #1c1c1e; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; width: 80%; }
        .name { font-size: 18px; font-weight: bold; color: #007AFF; }
    </style>
</head>
<body>

    <div class="user-info">
        <p>Привет, <span id="user-name" class="name">Аноним</span>!</p>
        <div id="ton-connect-button"></div>
        <p id="wallet-address" style="font-size: 12px; color: #888; word-break: break-all;"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // 1. Показываем имя из Телеграма
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
        }

        // 2. Настраиваем кнопку подключения кошелька (TON Connect)
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/uniloc/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // 3. Следим за статусом подключения
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                document.getElementById('wallet-address').innerText = `Подключено: ${wallet.account.address}`;
                console.log('Кошелек подключен:', wallet);
            } else {
                document.getElementById('wallet-address').innerText = 'Кошелек не подключен';
            }
        });
    </script>
</body>
</html>
