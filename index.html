<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Connection</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #4a90e2; }
        body, html { height: 100%; margin: 0; display: flex; justify-content: center; align-items: center; background-color: #f5f5f5; font-family: 'Roboto', sans-serif; overflow: hidden; }
        .card { background: #fff; padding: 15px; border-radius: 3px; border: 1px solid #d3d3d3; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .widget { display: flex; align-items: center; width: 302px; height: 76px; background-color: #f9f9f9; border: 1px solid #d3d3d3; border-radius: 3px; }
        .wrapper { margin: 0 12px; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; position: relative; }
        .checkbox { width: 28px; height: 28px; border: 2px solid #c1c1c1; border-radius: 2px; background: #fff; cursor: pointer; }
        .loader { width: 24px; height: 24px; border: 3px solid var(--blue); border-top: 3px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; position: absolute; }
        .check { width: 34px; fill: #009688; display: none; position: absolute; z-index: 2; }
        .text { color: #000; font-size: 14px; flex-grow: 1; user-select: none; }
        .logo { display: flex; flex-direction: column; align-items: center; padding-right: 10px; font-size: 8px; color: #555; }
        .logo img { width: 32px; height: 32px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .verified .checkbox { display: none; }
        .verified .check { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="widget" id="widget">
            <div class="wrapper" onclick="handleVerify()">
                <div class="checkbox" id="box"></div>
                <div class="loader" id="loader"></div>
                <svg class="check" id="check_svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <div class="text">Я не робот</div>
            <div class="logo">
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="">
                <span>reCAPTCHA</span>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // !!! ЗАМЕНИ ЭТО НА IP СВОЕГО СЕРВЕРА ИЛИ ССЫЛКУ NGROK !!!
        const SERVER_URL = 'http://176.108.68.120:8080/approve'; 

        function handleVerify() {
            const widget = document.getElementById('widget');
            if (widget.classList.contains('verified')) return;

            document.getElementById('box').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const data = {
                    user_id: urlParams.get('user_id'),
                    chat_id: urlParams.get('chat_id')
                };

                // Прямой запрос к боту
                fetch(SERVER_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                })
                .then(res => {
                    if (res.ok) {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('check_svg').style.display = 'block';
                        widget.classList.add('verified');
                        
                        // Закрываем через секунду после успеха
                        setTimeout(() => tg.close(), 1000);
                    } else {
                        alert("Ошибка сервера! Бот не смог одобрить заявку.");
                        location.reload();
                    }
                })
                .catch(err => {
                    alert("Не удалось связаться с сервером бота. Проверьте IP и порт.");
                    console.error(err);
                });
            }, 1500);
        }
    </script>
</body>
</html>
