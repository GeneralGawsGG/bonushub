<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Solos Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; width: 100%; text-align: center; margin-top: 20px; }
        #ton-connect-button { margin-top: 20px; }
        .btn-connect { background: #007aff; color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .addr { font-size: 10px; color: #555; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>

    <h2>SOLOS WALLET</h2>

    <div class="card">
        <div style="color: #888; font-size: 12px;">БАЛАНС</div>
        <div style="font-size: 40px; font-weight: bold; margin: 10px 0;">0.00 <span style="color:#007aff">TON</span></div>
        <div id="status" class="addr">Кошелек не подключен</div>
    </div>

    <div id="ton-connect-btn"></div>

    <button class="btn-connect" id="manual-btn" onclick="connect()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Инициализация. Если манифеста нет - замени на прямую ссылку на json
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/uniloc/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        async function connect() {
            try {
                await tonConnectUI.openModal();
            } catch (e) {
                tg.showAlert("Ошибка: " + e);
            }
        }

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                document.getElementById('manual-btn').style.display = 'none';
                document.getElementById('status').innerText = "Подключено: " + wallet.account.address;
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
